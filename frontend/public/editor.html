<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editor de Acordes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, serif;
    background: #fff;
    color: #000;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    border-bottom: 3px solid #000;
    padding: 10px 18px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  header h1 { font-size: 18px; font-weight: bold; }
  header small { font-size: 10px; color: #555; }
  #saved-badge {
    font-size: 11px; font-weight: bold; padding: 3px 10px;
    border-radius: 20px; border: 2px solid #000; background: #fff;
    white-space: nowrap;
  }
  #saved-badge.saved   { background: #d4edda; border-color: #155724; color: #155724; }
  #saved-badge.unsaved { background: #fff3cd; border-color: #856404; color: #856404; }

  /* ── Metadata ── */
  #meta {
    border-bottom: 2px solid #000;
    padding: 8px 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex-shrink: 0;
  }
  .field { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 110px; }
  .field label { font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #444; }
  .field input, .field select {
    border: 2px solid #000; border-radius: 5px;
    padding: 7px 9px; font-size: 15px;
    font-family: Georgia, serif; background: #fff; color: #000; outline: none;
  }
  .field input:focus { background: #f5f5f5; }

  /* ── Columnas ── */
  #workspace {
    flex: 1;
    display: flex;
    min-height: 0;
    overflow: hidden;
  }

  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  .col + .col { border-left: 2px solid #000; }

  .col-header {
    border-bottom: 2px solid #000;
    padding: 4px 14px;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: #f8f8f8;
    flex-shrink: 0;
  }

  #raw-input {
    flex: 1;
    width: 100%;
    padding: 8px 14px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.5;
    border: none;
    outline: none;
    resize: none;
    background: #fff;
    color: #000;
  }

  #preview-content {
    flex: 1;
    overflow-y: auto;
    padding: 8px 14px;
  }

  .prev-spacer { height: 6px; }
  .prev-line { margin-bottom: 1px; line-height: 1.5; font-size: 16px; }
  .chord-token { font-weight: bold; font-size: 14px; border-bottom: 2px solid #000; margin-right: 1px; }
  .chord-only-line { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
  .chord-only-line .chord-token { border-bottom: none; background: #eee; padding: 1px 5px; border-radius: 3px; }

  /* ── Acciones ── */
  #actions {
    border-top: 2px solid #000;
    padding: 8px 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    flex-shrink: 0;
  }
  .btn {
    flex: 1; min-width: 100px;
    padding: 13px 8px;
    font-size: 15px; font-weight: bold; font-family: Georgia, serif;
    border: 2px solid #000; border-radius: 7px;
    cursor: pointer; background: #fff; color: #000;
  }
  .btn:active { opacity: 0.6; }
  .btn.save   { background: #222; color: #fff; border-color: #222; }
  .btn.upload { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn:disabled { opacity: 0.3; cursor: default; }

  /* ── Modal ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #fff; border: 3px solid #000; border-radius: 12px;
    width: 100%; max-width: 540px; max-height: 90vh;
    overflow-y: auto; display: flex; flex-direction: column;
  }
  #modal-header {
    border-bottom: 2px solid #000; padding: 13px 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #modal-header h2 { font-size: 17px; font-weight: bold; }
  #modal-close {
    font-size: 20px; font-weight: bold; background: none;
    border: 2px solid #000; border-radius: 6px; cursor: pointer;
    padding: 2px 9px; font-family: Georgia, serif;
  }
  #modal-body { padding: 16px; }
  #modal-meta { margin-bottom: 12px; }
  #modal-meta p { font-size: 14px; margin-bottom: 3px; }
  #modal-song-preview {
    border: 2px solid #000; border-radius: 7px; padding: 12px;
    max-height: 260px; overflow-y: auto; margin-bottom: 14px; background: #fafafa;
  }
  #modal-footer {
    border-top: 2px solid #000; padding: 12px 18px;
    display: flex; gap: 8px;
  }
  #modal-footer .btn { min-width: 0; }
  #upload-status {
    padding: 9px 13px; border-radius: 7px;
    font-size: 14px; font-weight: bold; margin-bottom: 10px; display: none;
  }
  #upload-status.ok  { background: #d4edda; color: #155724; border: 2px solid #155724; display: block; }
  #upload-status.err { background: #f8d7da; color: #721c24; border: 2px solid #721c24; display: block; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: #000; color: #fff; padding: 10px 20px; border-radius: 30px;
    font-size: 13px; font-weight: bold; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap; z-index: 200;
  }
  #toast.show { opacity: 1; }

  /* ── Mobile: columnas apiladas ── */
  @media (max-width: 600px) {
    #workspace { flex-direction: column; }
    .col + .col { border-left: none; border-top: 2px solid #000; }
    #raw-input { min-height: 200px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>✏️ Editor de Acordes</h1>
    <small>Sin internet · Sin IA · Sube al catálogo</small>
  </div>
  <span id="saved-badge">Sin cambios</span>
</header>

<div id="meta">
  <div class="field" style="flex:2;min-width:140px">
    <label>Título</label>
    <input id="inp-title" type="text" placeholder="Nombre de la canción..." spellcheck="true" lang="es" oninput="markUnsaved()" />
  </div>
  <div class="field" style="flex:2;min-width:120px">
    <label>Artista</label>
    <input id="inp-artist" type="text" placeholder="Artista..." spellcheck="true" lang="es" oninput="markUnsaved()" />
  </div>
  <div class="field" style="flex:1;min-width:85px">
    <label>Tonalidad</label>
    <select id="inp-key" onchange="markUnsaved()">
      <option>C</option><option>C#</option><option>D</option><option>D#</option>
      <option>E</option><option>F</option><option>F#</option><option>G</option>
      <option>G#</option><option>A</option><option>A#</option><option>B</option>
    </select>
  </div>
  <div class="field" style="flex:1;min-width:95px">
    <label>Género</label>
    <select id="inp-genre" onchange="markUnsaved()">
      <option value="">General</option>
      <option>Folklore</option><option>Rock</option><option>Pop</option>
      <option>Cumbia</option><option>Tango</option><option>Balada</option>
      <option>Tropical</option><option>Otro</option>
    </select>
  </div>
</div>

<!-- Columnas lado a lado -->
<div id="workspace">
  <div class="col">
    <div class="col-header">✏️ Editar</div>
    <textarea id="raw-input"
      placeholder="Escribí la letra con acordes.

Línea de solo acordes (intro):
  Em  G  Am  C

Acordes con la letra:
  [Em]Al amanecer [G]niño

El corrector subraya errores."
      spellcheck="true" lang="es"
      oninput="renderPreview(); markUnsaved()"
    ></textarea>
  </div>

  <div class="col">
    <div class="col-header">👁 Vista previa</div>
    <div id="preview-content"></div>
  </div>
</div>

<div id="actions">
  <button class="btn save"   onclick="saveLocal()">💾 Guardar cambios</button>
  <button class="btn"        onclick="copyResult()">📋 Copiar</button>
  <button class="btn"        onclick="saveFile()">⬇️ .txt</button>
  <button class="btn upload" onclick="openUploadModal()">🚀 Subir a AcordesPro</button>
  <button class="btn"        onclick="clearAll()" style="flex:0;min-width:50px;font-size:17px">🗑</button>
</div>

<!-- Modal confirmación de subida -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <h2>🚀 Subir al catálogo</h2>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body">
      <div id="upload-status"></div>
      <div id="modal-meta"></div>
      <div id="modal-song-preview"></div>
    </div>
    <div id="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn upload" id="btn-confirm-upload" onclick="confirmUpload()">✔ Confirmar y subir</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SB_URL = 'https://gqaithistalmvlcsfntw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxYWl0aGlzdGFsbXZsY3NmbnR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTM1NDIsImV4cCI6MjA5NjM4OTU0Mn0.9N-wgu6Ujao52fqKINKjdnUWGGdbUKPK1n1uwjD76OU';
const LS_KEY = 'acordes_editor_draft';

// ── Detección de acordes ──────────────────────────────────────────────────────
const CHORD_RE = /^[A-G][#b]?(maj7?|min7?|7|9|11|13|m7?|M7?|dim7?|aug|sus[24]?|add\d+|6)*(\/[A-G][#b]?)?$/;
const isChord = t => CHORD_RE.test(t.trim());
const isChordOnlyLine = line => {
  const tokens = line.trim().split(/\s+/).filter(Boolean);
  return tokens.length > 0 && tokens.every(isChord);
};

// ── Render vista previa ───────────────────────────────────────────────────────
function renderLines(text, container) {
  container.innerHTML = '';
  text.split('\n').forEach(line => {
    if (!line.trim()) {
      const sp = document.createElement('div'); sp.className = 'prev-spacer';
      container.appendChild(sp); return;
    }
    if (isChordOnlyLine(line)) {
      const row = document.createElement('div'); row.className = 'chord-only-line';
      line.trim().split(/\s+/).forEach(ch => {
        const s = document.createElement('span'); s.className = 'chord-token'; s.textContent = ch;
        row.appendChild(s);
      });
      container.appendChild(row); return;
    }
    const row = document.createElement('div'); row.className = 'prev-line';
    line.split(/(\[[^\]]+\])/g).forEach(p => {
      const s = document.createElement('span');
      if (p.startsWith('[') && p.endsWith(']')) { s.className = 'chord-token'; s.textContent = p.slice(1,-1); }
      else { s.textContent = p; }
      row.appendChild(s);
    });
    container.appendChild(row);
  });
}
function renderPreview() {
  renderLines(document.getElementById('raw-input').value, document.getElementById('preview-content'));
}

// ── Guardar / cargar borrador local (localStorage) ────────────────────────────
function markUnsaved() {
  const b = document.getElementById('saved-badge');
  b.textContent = '● Sin guardar'; b.className = 'unsaved';
}
function saveLocal() {
  const draft = {
    title:  document.getElementById('inp-title').value,
    artist: document.getElementById('inp-artist').value,
    key:    document.getElementById('inp-key').value,
    genre:  document.getElementById('inp-genre').value,
    text:   document.getElementById('raw-input').value,
    ts:     new Date().toLocaleString('es-AR')
  };
  localStorage.setItem(LS_KEY, JSON.stringify(draft));
  const b = document.getElementById('saved-badge');
  b.textContent = '✓ Guardado ' + draft.ts; b.className = 'saved';
  toast('💾 Guardado localmente');
}
function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (!d) return;
    document.getElementById('inp-title').value  = d.title  || '';
    document.getElementById('inp-artist').value = d.artist || '';
    document.getElementById('inp-key').value    = d.key    || 'C';
    document.getElementById('inp-genre').value  = d.genre  || '';
    document.getElementById('raw-input').value  = d.text   || '';
    renderPreview();
    const b = document.getElementById('saved-badge');
    b.textContent = '✓ Guardado ' + (d.ts || ''); b.className = 'saved';
  } catch(e) {}
}

// ── Modal de subida ───────────────────────────────────────────────────────────
function openUploadModal() {
  const title  = document.getElementById('inp-title').value.trim();
  const artist = document.getElementById('inp-artist').value.trim();
  const text   = document.getElementById('raw-input').value.trim();
  if (!title)  { toast('Falta el título'); return; }
  if (!artist) { toast('Falta el artista'); return; }
  if (!text)   { toast('Falta la letra'); return; }

  document.getElementById('modal-meta').innerHTML = `
    <p><strong>Título:</strong> ${title}</p>
    <p><strong>Artista:</strong> ${artist}</p>
    <p><strong>Tonalidad:</strong> ${document.getElementById('inp-key').value}
       &nbsp;|&nbsp; <strong>Género:</strong> ${document.getElementById('inp-genre').value || 'General'}</p>
  `;
  renderLines(text, document.getElementById('modal-song-preview'));
  document.getElementById('upload-status').className = '';
  document.getElementById('upload-status').textContent = '';
  document.getElementById('btn-confirm-upload').disabled = false;
  document.getElementById('btn-confirm-upload').textContent = '✔ Confirmar y subir';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

async function confirmUpload() {
  const btn = document.getElementById('btn-confirm-upload');
  btn.disabled = true; btn.textContent = '⏳ Subiendo...';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/community_songs`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        title:        document.getElementById('inp-title').value.trim(),
        artist:       document.getElementById('inp-artist').value.trim(),
        original_key: document.getElementById('inp-key').value,
        genre:        document.getElementById('inp-genre').value || '',
        lines:        document.getElementById('raw-input').value.split('\n'),
        youtube_url:  null
      })
    });
    if (res.ok) {
      const st = document.getElementById('upload-status');
      st.className = 'ok';
      st.textContent = '✅ ¡Canción subida al catálogo de AcordesPro!';
      btn.textContent = '✔ Subida exitosa';
    } else {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `Error ${res.status}`);
    }
  } catch(e) {
    const st = document.getElementById('upload-status');
    st.className = 'err'; st.textContent = '❌ ' + (e.message || 'Sin conexión');
    btn.disabled = false; btn.textContent = '🔁 Reintentar';
  }
}

// ── Copiar / guardar .txt ─────────────────────────────────────────────────────
function copyResult() {
  const t = document.getElementById('raw-input').value;
  if (!t.trim()) { toast('Nada para copiar'); return; }
  navigator.clipboard.writeText(t).then(() => toast('📋 Copiado'));
}
function saveFile() {
  const title  = document.getElementById('inp-title').value.trim() || 'cancion';
  const artist = document.getElementById('inp-artist').value.trim();
  const key    = document.getElementById('inp-key').value;
  const body   = document.getElementById('raw-input').value;
  if (!body.trim()) { toast('Nada para guardar'); return; }
  const blob = new Blob([`# ${title}\n# Artista: ${artist}\n# Tonalidad: ${key}\n\n${body}`], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = title.replace(/\s+/g,'_') + '.txt'; a.click();
  toast('⬇️ Descargado');
}
function clearAll() {
  if (!confirm('¿Borrar todo? (también borra el borrador guardado)')) return;
  localStorage.removeItem(LS_KEY);
  ['raw-input','inp-title','inp-artist'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('preview-content').innerHTML = '';
  document.getElementById('saved-badge').textContent = 'Sin cambios';
  document.getElementById('saved-badge').className = '';
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Cerrar modal al click fuera ───────────────────────────────────────────────
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ── Cargar borrador al inicio ─────────────────────────────────────────────────
loadLocal();
</script>
</body>
</html>
