<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>AcordesPro - Letras y Acordes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              paper: '#fdfbf7',
              ink: '#2d3748',
              chord: '#3182ce',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      @media print {
        html, body { 
          height: auto !important; 
          overflow: visible !important; 
          background-color: white !important; 
          margin: 0 !important;
          padding: 0 !important;
        }
        #root { display: block !important; }
        .print-hidden { display: none !important; }
        .print-break-inside-avoid { break-inside: avoid; }
        .print-exact-colors { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        /* Forzar que el contenedor ocupe todo el ancho en impresión */
        .print-full-width { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }
      }
      
      /* Estilos para pantalla completa */
      :fullscreen {
        background-color: white;
        overflow-y: auto;
      }
      ::backdrop {
        background-color: white;
      }
      @keyframes chord-fade {
        from { opacity: 0; transform: scale(0.92); }
        to   { opacity: 1; transform: scale(1); }
      }
      .chord-fade-in {
        animation: chord-fade 0.18s ease-out both;
      }
    </style>
      </head>
  <body class="bg-paper text-ink min-h-screen font-sans selection:bg-blue-200 dark:bg-gray-950 dark:text-gray-100">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
